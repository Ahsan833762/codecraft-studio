<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CodeCraft Studio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&lt;/&gt;</text></svg>">
    <style>
        /* =====================================================
           Enhanced Signup Page - Premium Modern Design
           ===================================================== */
        
        /* Main Wrapper */
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        /* Floating Background Orbs */
        .auth-wrapper::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            animation: float 10s ease-in-out infinite;
            pointer-events: none;
        }

        .auth-wrapper::after {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            animation: float 8s ease-in-out infinite reverse;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(20px, -20px) rotate(5deg); }
            66% { transform: translate(-15px, 15px) rotate(-3deg); }
        }

        /* Particle Effects */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: particleFloat 15s infinite;
        }

        .particle:nth-child(1) { left: 15%; top: 25%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 25%; top: 75%; animation-delay: 2s; }
        .particle:nth-child(3) { left: 70%; top: 15%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 85%; top: 55%; animation-delay: 6s; }
        .particle:nth-child(5) { left: 50%; top: 65%; animation-delay: 8s; }

        @keyframes particleFloat {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-100px) scale(1.5); opacity: 0.6; }
        }

        /* Container Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-container {
            width: 100%;
            max-width: 560px;
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Card Styles */
        .auth-card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 
                0 0 0 1px rgba(255,255,255,0.1),
                0 20px 50px -12px rgba(0, 0, 0, 0.35),
                0 10px 20px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        /* Header Gradient */
        .auth-header {
            padding: 45px 35px 35px;
            text-align: center;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            color: #ffffff;
            position: relative;
            overflow: hidden;
        }

        .auth-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 50%);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translate(-10%, -10%); }
            50% { transform: translate(10%, 10%); }
        }

        /* Logo */
        .auth-logo {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 22px;
            font-size: 2rem;
            font-weight: 800;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 1;
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .auth-logo:hover {
            transform: scale(1.08) rotate(4deg);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4);
        }

        .auth-title {
            font-size: 1.85rem;
            font-weight: 750;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
            letter-spacing: -0.5px;
        }

        .auth-subtitle {
            opacity: 0.92;
            font-size: 0.95rem;
            font-weight: 400;
            position: relative;
            z-index: 1;
        }

        /* Body */
        .auth-body {
            padding: 42px 45px;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 9px;
            font-weight: 600;
            color: #374151;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        /* Input Fields */
        .form-input {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-size: 0.95rem;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            background: #fafafa;
            color: #111827;
            font-family: inherit;
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .form-input:focus {
            outline: none;
            border-color: #6366f1;
            background: #ffffff;
            box-shadow: 
                0 0 0 5px rgba(99, 102, 241, 0.15),
                0 8px 20px -5px rgba(99, 102, 241, 0.2);
            transform: translateY(-2px);
        }

        .form-input:hover:not(:focus) {
            border-color: #d1d5db;
            background: #ffffff;
        }

        /* Name Grid */
        .name-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        /* Buttons */
        .btn {
            padding: 16px 28px;
            border-radius: 14px;
            font-weight: 650;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1rem;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            box-shadow: 
                0 4px 15px 0 rgba(99, 102, 241, 0.35),
                0 1px 3px 0 rgba(0, 0, 0, 0.1);
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 12px 28px 0 rgba(99, 102, 241, 0.35),
                0 4px 8px 0 rgba(0, 0, 0, 0.1);
            background: linear-gradient(135deg, #5558e3 0%, #7c3aed 100%);
        }

        .btn-primary:active {
            transform: translateY(-1px) scale(0.98);
            box-shadow: 0 2px 8px 0 rgba(99, 102, 241, 0.3);
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 28px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #6366f1;
            margin-top: 2px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .checkbox-group label {
            font-size: 0.85rem;
            color: #6b7280;
            line-height: 1.6;
            cursor: pointer;
        }

        .checkbox-group a {
            color: #6366f1;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s;
        }

        .checkbox-group a:hover {
            color: #4f46e5;
            text-decoration: underline;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            color: #9ca3af;
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #e5e7eb, transparent);
        }

        .divider span {
            padding: 0 18px;
            font-weight: 500;
        }

        /* Social Buttons */
        .social-login {
            display: flex;
            gap: 14px;
            margin-top: 22px;
        }

        .social-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid #f3f4f6;
            border-radius: 14px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 550;
            color: #374151;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .social-btn:hover {
            border-color: #6366f1;
            background: #f5f3ff;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px -5px rgba(99, 102, 241, 0.2);
            color: #6366f1;
        }

        .social-btn:active {
            transform: translateY(-1px);
        }

        /* Footer */
        .auth-footer {
            padding: 30px 45px 35px;
            text-align: center;
            border-top: 1px solid #f3f4f6;
            background: #fafafa;
        }

        .auth-footer p {
            color: #6b7280;
            font-size: 0.92rem;
        }

        .auth-footer a {
            color: #6366f1;
            font-weight: 650;
            text-decoration: none;
            position: relative;
            transition: all 0.3s ease;
        }

        .auth-footer a::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: -3px;
            left: 0;
            background: #6366f1;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .auth-footer a:hover {
            color: #4f46e5;
        }

        .auth-footer a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* Back Home */
        .back-home {
            text-align: center;
            margin-top: 28px;
        }

        .back-home a {
            color: rgba(255, 255, 255, 0.95);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .back-home a:hover {
            background: rgba(255, 255, 255, 0.22);
            transform: translateX(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        /* Mobile */
        @media (max-width: 480px) {
            .auth-header { padding: 38px 28px 30px; }
            .auth-body { padding: 30px 28px; }
            .auth-footer { padding: 24px 28px 28px; }
            .auth-title { font-size: 1.6rem; }
            .social-login { flex-direction: column; }
            .auth-wrapper { padding: 20px 12px; }
            .name-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body class="auth-wrapper">
    
    <!-- Particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">CC</div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join us and start building amazing things</p>
            </div>
            
            <div class="auth-body">
                <div id="alertContainer"></div>
                
                <form id="signupForm">
                    <div class="name-grid">
                        <div class="form-group">
                            <label class="form-label" for="first_name">First Name</label>
                            <input type="text" id="first_name" name="first_name" class="form-input" 
                                   placeholder="John" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="last_name">Last Name</label>
                            <input type="text" id="last_name" name="last_name" class="form-input" 
                                   placeholder="Doe" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="form-input" 
                               placeholder="john@example.com" required autocomplete="email">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="form-input" 
                               placeholder="+92 300 1234567">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-input" 
                               placeholder="Create a strong password" required autocomplete="new-password">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" class="form-input" 
                               placeholder="Confirm your password" required autocomplete="new-password">
                    </div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">
                            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="signupBtn">
                        <span class="btn-text">Create Account</span>
                    </button>
                </form>
                
                <div class="divider">
                    <span>or continue with</span>
                </div>
                
                <div class="social-login">
                    <button type="button" class="social-btn" onclick="alert('Social login coming soon!')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Google
                    </button>
                    <button type="button" class="social-btn" onclick="alert('Social login coming soon!')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                        GitHub
                    </button>
                </div>
            </div>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="/login">Sign In</a></p>
            </div>
        </div>
        
        <div class="back-home">
            <a href="/">
                <span>←</span> Back to Home
            </a>
        </div>
    </div>

    <script>
        const signupForm = document.getElementById('signupForm');
        const signupBtn = document.getElementById('signupBtn');
        
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const first_name = document.getElementById('first_name').value;
            const last_name = document.getElementById('last_name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            
            if (password !== confirm_password) {
                showAlert('Passwords do not match', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters', 'error');
                return;
            }
            
            signupBtn.disabled = true;
            signupBtn.querySelector('.btn-text').textContent = 'Creating account...';
            
            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ first_name, last_name, email, phone, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    signupBtn.querySelector('.btn-text').textContent = '✓ Account Created!';
                    signupBtn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                    
                    setTimeout(() => {
                        window.location.href = data.redirect || '/';
                    }, 600);
                } else {
                    showAlert(data.message || 'Signup failed', 'error');
                    signupBtn.disabled = false;
                    signupBtn.querySelector('.btn-text').textContent = 'Create Account';
                }
            } catch (error) {
                showAlert('An error occurred. Please try again.', 'error');
                signupBtn.disabled = false;
                signupBtn.querySelector('.btn-text').textContent = 'Create Account';
            }
        });
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div style="padding: 15px 20px; border-radius: 12px; margin-bottom: 22px; font-size: 0.9rem; font-weight: 500; ${type === 'error' ? 'background: #fef2f2; color: #991b1b; border: 1px solid #fecaca;' : 'background: #ecfdf5; color: #065f46;'}">
                    ${message}
                </div>
            `;
            
            setTimeout(() => { alertContainer.innerHTML = ''; }, 5000);
        }
    </script>
</body>
</html>
