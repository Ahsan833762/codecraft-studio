<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Settings - CodeCraft Studio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        
        * { font-family: 'Outfit', sans-serif; }
        
        body { background: #0f0f1a; overflow-x: hidden; }
        
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        
        .bg-animation::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
            animation: bgPulse 15s ease-in-out infinite;
        }
        
        @keyframes bgPulse { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(2%, 2%); } }
        
        .sidebar {
            position: fixed !important; width: 280px !important;
            background: rgba(20, 20, 35, 0.8) !important;
            backdrop-filter: blur(20px) !important;
            border-right: 1px solid rgba(255, 255, 255, 0.08) !important;
            height: 100vh !important; z-index: 100;
            display: flex; flex-direction: column;
        }
        
        .sidebar-logo {
            padding: 25px !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
            display: flex; align-items: center; gap: 15px;
        }
        
        .sidebar-logo-icon {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 800; font-size: 1.3rem;
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.4);
        }
        
        .sidebar-logo-text { color: white; font-weight: 700; font-size: 1.2rem; }
        .sidebar-logo-sub { color: rgba(255, 255, 255, 0.5); font-size: 0.75rem; }
        
        .sidebar-nav { padding: 20px 15px; flex: 1; overflow-y: auto; }
        
        .sidebar-link {
            display: flex !important; align-items: center; gap: 12px;
            padding: 14px 18px;
            color: rgba(255, 255, 255, 0.6) !important;
            text-decoration: none; border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .sidebar-link:hover {
            background: rgba(139, 92, 246, 0.2) !important;
            color: white !important; transform: translateX(5px);
        }
        
        .sidebar-link.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.4), rgba(99, 102, 241, 0.3)) !important;
            color: white !important; border-left: 3px solid #8b5cf6;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
        }
        
        .sidebar-link i { font-size: 1.1rem; width: 24px; }
        
        .sidebar-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            margin: 15px 0;
        }
        
        .sidebar-user {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; align-items: center; gap: 12px;
        }
        
        .sidebar-avatar {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 1.1rem;
        }
        
        .sidebar-user-name { color: white; font-weight: 600; font-size: 0.95rem; }
        .sidebar-user-role { color: rgba(255, 255, 255, 0.5); font-size: 0.75rem; }
        
        .sidebar-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .sidebar-footer p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
            margin: 0;
        }
        
        .main-content {
            margin-left: 280px !important;
            min-height: 100vh; position: relative; z-index: 1; padding: 30px;
        }
        
        .header {
            background: rgba(20, 20, 35, 0.6) !important;
            backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 20px !important;
            padding: 25px 30px !important;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .header-title h1 { font-size: 1.8rem; font-weight: 700; color: white; margin: 0; }
        .header-title p { color: rgba(255, 255, 255, 0.5); margin: 5px 0 0 0; font-size: 0.9rem; }
        
        .settings-card {
            background: rgba(20, 20, 35, 0.6) !important;
            backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 20px !important;
            padding: 30px !important;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease-out forwards;
        }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .settings-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .settings-title {
            font-size: 1.2rem; font-weight: 700; color: white;
            display: flex; align-items: center; gap: 10px;
        }
        
        .settings-title i { color: #8b5cf6; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: rgba(255, 255, 255, 0.8); font-size: 0.9rem; }
        
        .form-control {
            width: 100%; padding: 14px 16px;
            background: rgba(30, 30, 50, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px; color: white; font-size: 0.95rem;
            transition: all 0.3s; box-sizing: border-box;
        }
        
        .form-control:focus { outline: none; border-color: #8b5cf6; background: rgba(139, 92, 246, 0.1); box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2); }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.3); }
        
        textarea.form-control { resize: vertical; min-height: 120px; }
        
        .btn-save {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border: none; color: white; padding: 16px 32px;
            border-radius: 12px; font-weight: 600; cursor: pointer;
            transition: all 0.3s; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
            font-size: 1rem;
        }
        
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(139, 92, 246, 0.6);
        }
        
        .toast {
            position: fixed; top: 30px; right: 30px;
            background: rgba(20, 20, 35, 0.95);
            backdrop-filter: blur(20px);
            padding: 18px 28px; border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            display: none; z-index: 9999;
            animation: slideInRight 0.4s ease-out;
            color: white;
        }
        
        @keyframes slideInRight { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.5); border-radius: 4px; }
    </style>
</head>

<body>
    <div class="bg-animation"></div>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon">CC</div>
            <div><div class="sidebar-logo-text">CodeCraft</div><div class="sidebar-logo-sub">Admin Panel</div></div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="/admin" class="sidebar-link"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
            <a href="/admin/messages" class="sidebar-link"><i class="fas fa-envelope"></i><span>Messages</span><span class="msg-badge" id="msgBadge" style="display:none; margin-left: auto; background: #ff6b6b; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem;">0</span></a>
            <a href="/admin/employees" class="sidebar-link"><i class="fas fa-users"></i><span>Employees</span></a>
            <a href="/admin/clients" class="sidebar-link"><i class="fas fa-building"></i><span>Clients</span></a>
            <a href="/admin/orders" class="sidebar-link"><i class="fas fa-clipboard-list"></i><span>Orders</span></a>
            <a href="/admin/services" class="sidebar-link"><i class="fas fa-tools"></i><span>Services</span></a>
            <a href="/admin/payments" class="sidebar-link"><i class="fas fa-credit-card"></i><span>Payments</span></a>
            <a href="/admin/settings" class="sidebar-link active"><i class="fas fa-cog"></i><span>Settings</span></a>
            <div class="sidebar-divider"></div>
            <a href="/" class="sidebar-link" target="_blank"><i class="fas fa-globe"></i><span>View Website</span></a>
            <button onclick="logout()" class="sidebar-link" style="width: 100%; border: none;"><i class="fas fa-sign-out-alt" style="color: #ff6b6b;"></i><span style="color: #ff6b6b;">Logout</span></button>
        </nav>
        
        <div class="sidebar-user">
            <div class="sidebar-avatar" id="adminAvatar">A</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" id="adminName">Admin</div>
                <div class="sidebar-user-role">Administrator</div>
            </div>
        </div>
        
        <div class="sidebar-footer">
            <p>Developed by M. Ahsan Shah</p>
        </div>
    </aside>

    <div class="main-content">
        <header class="header">
            <div class="header-title">
                <h1>Website Settings</h1>
                <p>Manage your website configuration and content</p>
            </div>
        </header>

        <div style="max-width: 800px;">
            <!-- General Settings -->
            <div class="settings-card">
                <div class="settings-header">
                    <h3 class="settings-title"><i class="fas fa-building"></i> General Settings</h3>
                </div>
                <div class="form-group">
                    <label>Website Name</label>
                    <input type="text" id="website_name" class="form-control" placeholder="Your company name">
                </div>
                <div class="form-group">
                    <label>Website Tagline</label>
                    <input type="text" id="website_tagline" class="form-control" placeholder="Your tagline">
                </div>
            </div>

            <!-- Contact Settings -->
            <div class="settings-card">
                <div class="settings-header">
                    <h3 class="settings-title"><i class="fas fa-phone"></i> Contact Information</h3>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Contact Email</label>
                        <input type="email" id="contact_email" class="form-control" placeholder="contact@example.com">
                    </div>
                    <div class="form-group">
                        <label>Contact Phone</label>
                        <input type="text" id="contact_phone" class="form-control" placeholder="+1 234 567 890">
                    </div>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="contact_address" class="form-control" placeholder="Full address">
                </div>
            </div>

            <!-- About Section -->
            <div class="settings-card">
                <div class="settings-header">
                    <h3 class="settings-title"><i class="fas fa-info-circle"></i> About Section</h3>
                </div>
                <div class="form-group">
                    <label>About Content</label>
                    <textarea id="about_content" class="form-control" placeholder="Write something about your company..."></textarea>
                </div>
            </div>

            <div style="text-align: right;">
                <button class="btn-save" onclick="saveSettings()">
                    <i class="fas fa-save"></i> Save Settings
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"><span id="toastMsg"></span></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => { checkAuth(); loadSettings(); loadUser(); });

        async function loadUser() {
            try {
                const res = await fetch('/api/check-auth');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('adminName').textContent = data.user.first_name || 'Admin';
                    document.getElementById('adminAvatar').textContent = (data.user.first_name || 'A').charAt(0);
                }
            } catch (e) { console.error(e); }
        }

        async function checkAuth() {
            try {
                const res = await fetch('/api/check-auth');
                const data = await res.json();
                if (!data.success || data.user.role !== 'admin') window.location.href = '/login';
            } catch (e) { window.location.href = '/login'; }
        }

        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('website_name').value = data.settings.website_name || '';
document.getElementById('website_tagline').value = data.settings.website_tagline || '';
                    document.getElementById('contact_email').value = data.settings.contact_email || '';
                    document.getElementById('contact_phone').value = data.settings.contact_phone || '';
                    document.getElementById('contact_address').value = data.settings.contact_address || '';
                    document.getElementById('about_content').value = data.settings.about_content || '';
                }
            } catch (e) { showToast('Error loading settings', 'error'); }
        }

        async function saveSettings() {
            const settings = {
                website_name: document.getElementById('website_name').value,
                website_tagline: document.getElementById('website_tagline').value,
                contact_email: document.getElementById('contact_email').value,
                contact_phone: document.getElementById('contact_phone').value,
                contact_address: document.getElementById('contact_address').value,
                about_content: document.getElementById('about_content').value
            };

            try {
                const res = await fetch('/api/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(settings) });
                const data = await res.json();
                if (data.success) { showToast('Settings saved successfully!'); }
                else { showToast(data.message, 'error'); }
            } catch (e) { showToast('Error saving settings', 'error'); }
        }

        async function logout() { await fetch('/api/logout', { method: 'POST' }); window.location.href = '/login'; }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.style.borderLeft = type === 'error' ? '4px solid #ef4444' : '4px solid #10b981';
            document.getElementById('toastMsg').textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
